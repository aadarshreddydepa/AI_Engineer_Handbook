<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 214" width="980" height="214" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="Compute — CPU vs GPU vs TPU">
<rect x="0" y="0" width="980" height="214" rx="16" fill="#0f172a"/>
<rect x="1" y="1" width="978" height="212" rx="15" fill="none" stroke="#1e293b" stroke-width="2"/>
<text x="24" y="34" fill="#f1f5f9" font-size="20" font-weight="700">Compute — CPU vs GPU vs TPU</text>
<text x="24" y="55" fill="#94a3b8" font-size="13">match parallelism to the workload</text>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker></defs>
<rect x="24.0" y="98" width="221.0" height="62" rx="10" fill="#4a90d9"/>
<text x="134.5" y="127.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">CPU</text>
<text x="134.5" y="141.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">few fast cores</text>
<rect x="261.0" y="98" width="221.0" height="62" rx="10" fill="#2e8b57"/>
<text x="371.5" y="127.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">GPU</text>
<text x="371.5" y="141.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">1000s of cores</text>
<rect x="498.0" y="98" width="221.0" height="62" rx="10" fill="#8e44ad"/>
<text x="608.5" y="127.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">TPU</text>
<text x="608.5" y="141.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">matmul ASIC</text>
<rect x="735.0" y="98" width="221.0" height="62" rx="10" fill="#e67e22"/>
<text x="845.5" y="127.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Bare metal</text>
<text x="845.5" y="141.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">/ serverless</text>
<line x1="245.0" y1="129.0" x2="261.0" y2="129.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="482.0" y1="129.0" x2="498.0" y2="129.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="719.0" y1="129.0" x2="735.0" y2="129.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#a)"/>
</svg>