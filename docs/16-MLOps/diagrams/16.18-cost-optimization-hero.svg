<text x="569.0" y="141.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">/ trim</text>
<rect x="656.0" y="98" width="142.0" height="62" rx="10" fill="#0e7490"/>
<text x="727.0" y="127.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Batch /</text>
<text x="727.0" y="141.0" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">quantize</text>
<rect x="814.0" y="98" width="142.0" height="62" rx="10" fill="#c0392b"/>
